{# Optimization progress chart — cumulative best taste over shots.
   Context: chart_data dict with labels, individual_scores, cumulative_best, failed_indices
#}
{% if chart_data %}
<div class="chart-container">
  <canvas id="progressChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script>
(function() {
  const data = {{ chart_data | tojson }};

  // Color failed shots differently
  const pointColors = data.individual_scores.map((score, i) =>
    data.failed_indices.includes(i) ? '#c84141' : 'rgba(200, 121, 65, 0.5)'
  );
  const pointBorders = data.individual_scores.map((score, i) =>
    data.failed_indices.includes(i) ? '#c84141' : 'rgba(200, 121, 65, 0.3)'
  );

  new Chart(document.getElementById('progressChart'), {
    type: 'line',
    data: {
      labels: data.labels,
      datasets: [
        {
          label: 'Cumulative Best',
          data: data.cumulative_best,
          borderColor: '#c87941',
          backgroundColor: 'rgba(200, 121, 65, 0.1)',
          fill: true,
          tension: 0.3,
          borderWidth: 3,
          pointRadius: 0,
          order: 1,
        },
        {
          label: 'Individual Shots',
          data: data.individual_scores,
          borderColor: 'transparent',
          backgroundColor: pointColors,
          pointBackgroundColor: pointColors,
          pointBorderColor: pointBorders,
          pointRadius: 6,
          pointHoverRadius: 8,
          showLine: false,
          order: 0,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: true,
          position: 'bottom',
          labels: {
            color: '#b0a090',
            font: { size: 12 },
            usePointStyle: true,
          },
        },
        tooltip: {
          backgroundColor: '#332d28',
          titleColor: '#f0e6d8',
          bodyColor: '#b0a090',
          borderColor: '#4a4038',
          borderWidth: 1,
          callbacks: {
            label: function(context) {
              const idx = context.dataIndex;
              const isFailed = data.failed_indices.includes(idx);
              const prefix = isFailed ? 'Failed: ' : 'Taste: ';
              return prefix + context.parsed.y;
            }
          }
        },
      },
      scales: {
        x: {
          title: { display: true, text: 'Shot #', color: '#807060' },
          ticks: { color: '#807060' },
          grid: { color: 'rgba(74, 64, 56, 0.3)' },
        },
        y: {
          title: { display: true, text: 'Taste Score', color: '#807060' },
          ticks: { color: '#807060' },
          grid: { color: 'rgba(74, 64, 56, 0.3)' },
          min: 0.5,
          max: 10.5,
        },
      },
    },
  });
})();
</script>
{% else %}
<div class="text-center py-6 text-base-content/50">
  <div class="text-sm">Pull at least 2 shots to see the progress chart.</div>
</div>
{% endif %}
