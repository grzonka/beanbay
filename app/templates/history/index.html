{% extends "base.html" %}

{% block title %}Brew History — BeanBay{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6 min-h-12">
  <h1 class="text-xl font-bold">Brew History</h1>
  <button type="button" id="delete-mode-btn" class="btn btn-ghost btn-sm"
    onclick="toggleDeleteMode()">🗑️ Delete</button>
</div>

<!-- Delete form (hidden until delete mode active) -->
<form id="delete-form" method="post" action="/history/delete-batch" style="display: none;">
  <div id="delete-bar" class="flex items-center justify-between gap-2 p-3 mb-4 rounded-xl bg-error/10 border border-error/30">
    <span id="delete-count" class="text-sm font-semibold">0 selected</span>
    <div class="flex gap-2">
      <button type="submit" class="btn btn-error btn-sm"
        onclick="return confirm('Delete ' + document.querySelectorAll('.delete-check:checked').length + ' brew(s)?')">
        Delete Selected
      </button>
      <button type="button" class="btn btn-ghost btn-sm" onclick="toggleDeleteMode()">Cancel</button>
    </div>
  </div>
</form>

<!-- Filter panel -->
<div class="card bg-base-200 border border-base-300 mb-4">
  <div class="card-body p-4">
    {% include "history/_filter_panel.html" %}
  </div>
</div>

<!-- Shot list -->
<div id="shot-list">
  {% include "history/_shot_list.html" %}
</div>

<!-- Modal container for shot detail -->
<dialog id="shot-modal" class="modal">
  <div class="modal-box bg-base-200 border border-base-300 max-w-lg">
    <div id="shot-modal-container"></div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>
{% endblock %}

{% block scripts %}
<script src="/static/js/tags.js"></script>
<script>
  function toggleDeleteMode() {
    var checks = document.querySelectorAll('.delete-check');
    var deleteForm = document.getElementById('delete-form');
    var deleteBtn = document.getElementById('delete-mode-btn');
    var isActive = checks.length > 0 && checks[0].style.display !== 'none';

    checks.forEach(function(cb) {
      cb.style.display = isActive ? 'none' : 'inline-block';
      cb.checked = false;
    });
    deleteForm.style.display = isActive ? 'none' : 'block';
    deleteBtn.textContent = isActive ? '🗑️ Delete' : 'Cancel Delete';
    updateDeleteCount();
  }
  function updateDeleteCount() {
    var count = document.querySelectorAll('.delete-check:checked').length;
    var el = document.getElementById('delete-count');
    if (el) el.textContent = count + ' selected';
  }
</script>
{% endblock %}
