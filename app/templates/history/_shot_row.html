<div class="card bg-base-200 border border-base-300 mb-2 cursor-pointer hover:bg-base-300 transition-colors" id="shot-{{ shot.id }}"
  hx-get="/history/{{ shot.id }}" hx-target="#shot-modal-container" hx-swap="innerHTML">
  <div class="card-body p-3">
    <input type="checkbox" class="delete-check" name="shot_ids" value="{{ shot.id }}" form="delete-form"
      style="display: none;" onchange="updateDeleteCount()">
    <div class="flex items-center justify-between">
      <span class="text-sm text-base-content/70">{{ shot.created_at.strftime('%b %d, %H:%M') }}</span>
      <span class="flex items-center gap-1">
        {% if shot.is_manual %}<span class="badge badge-ghost badge-sm">Manual</span>{% endif %}
        {% if shot.is_failed %}<span class="badge badge-error badge-sm">Failed</span>{% endif %}
        {% if shot.brew_setup_name %}<span class="badge badge-outline badge-sm">{{ shot.brew_setup_name }}</span>{% endif %}
        {% if shot.notes %}<span class="text-base-content/40" title="Has notes"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></span>{% endif %}
      </span>
    </div>
    <div class="flex items-center gap-4 mt-1">
      <span class="text-lg font-bold {% if shot.is_failed %}text-error{% endif %}">
        {{ shot.taste }}/10
      </span>
      <span class="text-sm text-base-content/70">Grind {{ shot.grind_setting }}</span>
      <span class="text-sm text-base-content/40 truncate">{{ shot.bean_name }}</span>
    </div>
  </div>
</div>
