{# Paper card — used in equipment/index.html #}
<div class="card bg-base-200 border border-base-300 mb-2 paper-card{% if paper.is_retired %} opacity-60{% endif %}">
  <div class="card-body p-4">
    <div class="flex items-center justify-between">
      <div>
        <h3 class="font-semibold">{{ paper.name }}</h3>
        {% if paper.description %}
          <div class="text-sm text-base-content/70 mt-1">{{ paper.description }}</div>
        {% endif %}
      </div>
      {% if paper.is_retired %}
        <span class="badge badge-ghost">Retired</span>
      {% endif %}
    </div>
    <div class="flex items-center justify-end gap-2 mt-2 pt-2 border-t border-base-300">
      <button
        class="btn btn-ghost btn-sm"
        onclick="openEditModal('/equipment/papers/{{ paper.id }}/edit')"
      >
        Edit
      </button>
      {% if paper.is_retired %}
        <form method="post" action="/equipment/papers/{{ paper.id }}/restore" style="display:inline;">
          <button type="submit" class="btn btn-primary btn-sm">Restore</button>
        </form>
      {% else %}
        <form method="post" action="/equipment/papers/{{ paper.id }}/retire" style="display:inline;">
          <button type="submit" class="btn btn-error btn-sm">Retire</button>
        </form>
      {% endif %}
    </div>
  </div>
</div>
