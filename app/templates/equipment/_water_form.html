{# Water recipe create/edit form — included in modals #}
{# If `recipe` is set, renders in edit mode; otherwise create mode #}

{% if recipe %}
<form method="post" action="/equipment/water-recipes/{{ recipe.id }}">
{% else %}
<form
  method="post"
  action="/equipment/water-recipes"
  hx-post="/equipment/water-recipes"
  hx-target="#water-list"
  hx-swap="afterbegin"
  hx-on::after-request="if(event.detail.successful){ closeEquipmentModal('water-add-modal'); this.reset(); }"
>
{% endif %}

  <div class="form-control mb-4">
    <label class="label"><span class="label-text">Name <span class="text-error">*</span></span></label>
    <input
      type="text"
      id="water-name"
      name="name"
      class="input input-bordered w-full"
      placeholder="e.g. Third Wave Water Classic Light"
      value="{{ recipe.name if recipe else '' }}"
      required
      autocomplete="off"
    >
  </div>

  <div class="form-control mb-4">
    <label class="label"><span class="label-text">Notes</span></label>
    <textarea
      id="water-notes"
      name="notes"
      class="textarea textarea-bordered w-full"
      rows="2"
      placeholder="e.g. Classic Light profile, mixed in 1 gallon distilled"
    >{{ recipe.notes if recipe and recipe.notes else '' }}</textarea>
  </div>

  <details class="mb-4">
    <summary class="cursor-pointer text-sm text-base-content/60 py-1 select-none">
      Mineral Details (ppm)
    </summary>
    <div class="mineral-grid mt-2">
      <div class="form-control mb-4">
        <label class="label"><span class="label-text">GH</span></label>
        <input type="number" id="water-gh" name="gh" class="input input-bordered w-full" step="any" min="0"
          placeholder="ppm" value="{{ recipe.gh if recipe and recipe.gh is not none else '' }}">
      </div>
      <div class="form-control mb-4">
        <label class="label"><span class="label-text">KH</span></label>
        <input type="number" id="water-kh" name="kh" class="input input-bordered w-full" step="any" min="0"
          placeholder="ppm" value="{{ recipe.kh if recipe and recipe.kh is not none else '' }}">
      </div>
      <div class="form-control mb-4">
        <label class="label"><span class="label-text">Ca</span></label>
        <input type="number" id="water-ca" name="ca" class="input input-bordered w-full" step="any" min="0"
          placeholder="ppm" value="{{ recipe.ca if recipe and recipe.ca is not none else '' }}">
      </div>
      <div class="form-control mb-4">
        <label class="label"><span class="label-text">Mg</span></label>
        <input type="number" id="water-mg" name="mg" class="input input-bordered w-full" step="any" min="0"
          placeholder="ppm" value="{{ recipe.mg if recipe and recipe.mg is not none else '' }}">
      </div>
      <div class="form-control mb-4">
        <label class="label"><span class="label-text">Na</span></label>
        <input type="number" id="water-na" name="na" class="input input-bordered w-full" step="any" min="0"
          placeholder="ppm" value="{{ recipe.na if recipe and recipe.na is not none else '' }}">
      </div>
      <div class="form-control mb-4">
        <label class="label"><span class="label-text">Cl</span></label>
        <input type="number" id="water-cl" name="cl" class="input input-bordered w-full" step="any" min="0"
          placeholder="ppm" value="{{ recipe.cl if recipe and recipe.cl is not none else '' }}">
      </div>
      <div class="form-control mb-4">
        <label class="label"><span class="label-text">SO₄</span></label>
        <input type="number" id="water-so4" name="so4" class="input input-bordered w-full" step="any" min="0"
          placeholder="ppm" value="{{ recipe.so4 if recipe and recipe.so4 is not none else '' }}">
      </div>
    </div>
  </details>

  <button type="submit" class="btn btn-primary w-full min-h-12">
    {% if recipe %}Save Changes{% else %}Add Water Recipe{% endif %}
  </button>
</form>
