<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1612">
  <title>{% block title %}BrewFlow{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a href="/beans" class="nav-brand">BrewFlow</a>
      <div class="nav-links">
        <a href="/brew" class="nav-link">Brew</a>
        <a href="/history" class="nav-link">History</a>
      </div>
      <div class="nav-active-bean" id="active-bean-indicator">
        {% if active_bean %}
          <a href="/beans/{{ active_bean.id }}">{{ active_bean.name }}</a>
          <form method="post" action="/beans/deactivate" style="display:inline; margin-left:0.25rem;">
            <button type="submit" class="btn btn-secondary" style="padding:0.15rem 0.4rem; font-size:0.75rem; min-height:auto;">✕</button>
          </form>
        {% else %}
          <span class="text-muted">No bean selected</span>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="main">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
